{% extends "base.html" %}

{% block title %}{% if profile %}Edit{% else %}Add{% endif %} Student - AAMS{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card">
            <div class="card-header bg-primary text-white">
                <h4>{% if profile %}Edit{% else %}Register New{% endif %} Student</h4>
            </div>
            <div class="card-body">
                <form method="post">
                    {% csrf_token %}
                    <div class="row">
                        <div class="col-md-8 mb-3">
                            <label class="form-label">Full Name</label>
                            <input type="text" name="full_name" class="form-control" value="{{ profile.user.full_name|default:'' }}" required>
                        </div>
                        <div class="col-md-4 mb-3">
                            <label class="form-label">Roll Number</label>
                            <input type="text" name="roll_number" class="form-control" value="{{ profile.roll_number|default:'' }}" required>
                        </div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Email</label>
                        <input type="email" name="email" class="form-control" value="{{ profile.user.email|default:'' }}" placeholder="email@example.com" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Password {% if profile %}(Leave blank to keep current){% endif %}</label>
                        <input type="password" name="password" class="form-control" {% if not profile %}required{% endif %}>
                    </div>
                    <div class="row">
                        <div class="col-md-8 mb-3">
                            <label class="form-label">Department</label>
                            <select name="department" class="form-select" required>
                                <option value="">Select Department</option>
                                {% for dept in departments %}
                                    <option value="{{ dept.id }}" {% if profile.department.id == dept.id %}selected{% endif %}>{{ dept.name }}</option>
                                {% endfor %}
                            </select>
                        </div>
                        <div class="col-md-4 mb-3">
                            <label class="form-label">Semester</label>
                            <select name="semester" class="form-select" required>
                                {% for i in "12345678"|make_list %}
                                    <option value="{{ i }}" {% if profile.semester|slugify == i %}selected{% endif %}>{{ i }}</option>
                                {% endfor %}
                            </select>
                        </div>
                    </div>
                    <div class="d-flex justify-content-between">
                        <a href="{% url 'student_list' %}" class="btn btn-secondary">Cancel</a>
                        <button type="submit" class="btn btn-success">Save Account</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
