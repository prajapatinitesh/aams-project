{% extends "base.html" %}

{% block title %}{% if object %}Edit{% else %}Add{% endif %} Department - AAMS{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card">
            <div class="card-header bg-primary text-white">
                <h4>{% if object %}Edit{% else %}Add New{% endif %} Department</h4>
            </div>
            <div class="card-body">
                <form method="post">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label for="id_name" class="form-label">Department Name</label>
                        <input type="text" name="name" class="form-control" id="id_name" value="{{ form.name.value|default:'' }}" required>
                        {% if form.name.errors %}
                            <div class="text-danger small">{{ form.name.errors }}</div>
                        {% endif %}
                    </div>
                    <div class="d-flex justify-content-between">
                        <a href="{% url 'dept_list' %}" class="btn btn-secondary">Cancel</a>
                        <button type="submit" class="btn btn-success">Save Department</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
