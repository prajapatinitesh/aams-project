{% extends "base.html" %}

{% block title %}Departments - AAMS{% endblock %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <h2>Departments</h2>
    <a href="{% url 'dept_create' %}" class="btn btn-primary">Add Department</a>
</div>

<div class="card">
    <div class="card-body p-0">
        <table class="table table-hover mb-0">
            <thead class="table-dark">
                <tr>
                    <th>#</th>
                    <th>Name</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody>
                {% for dept in departments %}
                <tr>
                    <td>{{ forloop.counter }}</td>
                    <td>{{ dept.name }}</td>
                    <td>
                        <a href="{% url 'dept_edit' dept.pk %}" class="btn btn-sm btn-info">Edit</a>
                        <a href="{% url 'dept_delete' dept.pk %}" class="btn btn-sm btn-danger">Delete</a>
                    </td>
                </tr>
                {% empty %}
                <tr>
                    <td colspan="3" class="text-center py-4">No departments found.</td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</div>
{% endblock %}
